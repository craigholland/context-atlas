name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "docs/Authoritative/**"
      - ".codex/**"
      - ".agents/skills/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "docs/Authoritative/**"
      - ".codex/**"
      - ".agents/skills/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  bootstrap-library:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        shell: bash
        run: |
          python -m pip install -e .[dev]

      - name: Check Codex runtime materialization
        shell: bash
        run: |
          python scripts/check_codex_materialization.py

      - name: Run preflight
        shell: bash
        run: |
          python scripts/preflight.py
