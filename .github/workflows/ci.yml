name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  bootstrap-library:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        shell: pwsh
        run: |
          py -3 -m pip install -e .[dev]

      - name: Run preflight
        shell: pwsh
        run: |
          py -3 scripts/preflight.py
