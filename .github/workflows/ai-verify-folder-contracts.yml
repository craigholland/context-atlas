name: Verify __ai__.md Folder Contracts

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  verify-ai-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set diff range
        id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            if base_candidate="$(git rev-parse "${head}^" 2>/dev/null)"; then
              base="$base_candidate"
            else
              base="$head"
            fi
          fi

          {
            echo "base_sha=$base"
            echo "head_sha=$head"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        shell: bash
        run: |
          python -m pip install -e .[dev]

      - name: Validate __ai__.md structure
        shell: bash
        run: |
          python scripts/validate_ai_docs.py \
            --repo-root . \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}" \
            --owner-file "__ai__.md"

      - name: Check __ai__.md freshness
        shell: bash
        run: |
          python scripts/check_ai_docs.py \
            --repo-root . \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}" \
            --owner-file "__ai__.md" \
            --governed-root "src/context_atlas" \
            --governed-root "tests" \
            --governed-root "scripts" \
            --governed-root ".github/workflows" \
            --suffix ".py" \
            --suffix ".toml" \
            --suffix ".yml"

      - name: Run folder contract verification
        shell: bash
        run: |
          python scripts/ai_verify_contracts.py \
            --repo-root . \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}" \
            --owner-file "__ai__.md"
