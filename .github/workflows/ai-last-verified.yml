name: Update Last Verified Metadata

on:
  push:
    branches:
      - development
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-last-verified:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set diff range
        id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            head="$(git rev-parse HEAD)"
            if base_candidate="$(git rev-parse "HEAD^" 2>/dev/null)"; then
              base="$base_candidate"
            else
              base="$head"
            fi
          fi

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            if base_candidate="$(git rev-parse "${head}^" 2>/dev/null)"; then
              base="$base_candidate"
            else
              base="$head"
            fi
          fi

          {
            echo "base_sha=$base"
            echo "head_sha=$head"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Update Last Verified metadata
        shell: bash
        run: |
          python scripts/update_last_verified.py \
            --repo-root . \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}" \
            --owner-file "__ai__.md"

      - name: Commit and push changes
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore(ai): update Last Verified metadata"
            git push origin HEAD:development
          fi
