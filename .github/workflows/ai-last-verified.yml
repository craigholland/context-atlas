name: Update Last Verified Metadata

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-last-verified:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set diff range
        id: diff
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $base = "${{ github.event.before }}"
            $head = "${{ github.sha }}"
          }
          else {
            $head = (git rev-parse HEAD).Trim()
            try {
              $base = (git rev-parse "HEAD^").Trim()
            }
            catch {
              $base = $head
            }
          }

          if ([string]::IsNullOrWhiteSpace($base) -or $base -eq "0000000000000000000000000000000000000000") {
            try {
              $base = (git rev-parse "$head^").Trim()
            }
            catch {
              $base = $head
            }
          }

          "base_sha=$base" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "head_sha=$head" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Update Last Verified metadata
        shell: pwsh
        run: |
          python scripts/update_last_verified.py `
            --repo-root . `
            --base "${{ steps.diff.outputs.base_sha }}" `
            --head "${{ steps.diff.outputs.head_sha }}" `
            --owner-file "__ai__.md"

      - name: Commit and push changes
        shell: pwsh
        run: |
          if (-not (git diff --quiet)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore(ai): update Last Verified metadata"
            git push
          }
