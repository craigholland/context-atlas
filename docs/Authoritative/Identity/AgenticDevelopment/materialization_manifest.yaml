# Context Atlas runtime materialization manifest.
# This file is the authoritative machine-readable input for first-pass runtime
# materialization decisions. It does not replace the human-readable binding and
# materialization docs under docs/Authoritative/Identity/AgenticDevelopment/.

version: 1
last_reviewed: 2026-04-21

project:
  id: context-atlas
  display_name: Context Atlas

authoritative_inputs:
  structural_profile: docs/Authoritative/Identity/Context-Atlas-Agentic-Development-Profile.md
  runtime_capacity: docs/Authoritative/Identity/AgenticDevelopment/runtime_capacity.yaml
  bindings_root: docs/Authoritative/Identity/AgenticDevelopment/Bindings/
  codex_binding_root: docs/Authoritative/Identity/AgenticDevelopment/Materializations/Codex/

materializations:
  - platform: Codex
    enabled: true
    runtime_root: .codex
    skills_root: .agents/skills
    orientation_surface: .codex/AGENTS.md
    config_surface: .codex/config.toml

roles:
  - id: planner-decomp
    source_name: Planner/Decomp
    parent_agent_id: parent-planner-decomp
  - id: backend
    source_name: Backend
    parent_agent_id: parent-backend
  - id: documentation-uat
    source_name: Documentation/UAT
    parent_agent_id: parent-documentation-uat
  - id: qa
    source_name: QA
    parent_agent_id: parent-qa
  - id: devops
    source_name: DevOps
    parent_agent_id: parent-devops

parent_agents:
  - id: parent-planner-decomp
    role_id: planner-decomp
    type: parent
    direct_skills:
      baseline:
        - planning-decomposition
        - composition-and-integration-planning
      conditional:
        - change-management
        - recovery-triage
    delegated_specialists:
      - specialist-planning-change
  - id: parent-backend
    role_id: backend
    type: parent
    direct_skills:
      baseline:
        - planning-decomposition
        - python-authoring
        - backend-architecture-clean
        - git-branch-and-history
      conditional:
        - python-debugging
        - python-testing
        - backend-architecture-solid
        - rework-remediation
    delegated_specialists:
      - specialist-python-implementation
  - id: parent-documentation-uat
    role_id: documentation-uat
    type: parent
    direct_skills:
      baseline:
        - review-findings-analysis
        - github-pr-review-and-handoff
      conditional:
        - change-management
        - rework-remediation
    delegated_specialists: []
  - id: parent-qa
    role_id: qa
    type: parent
    direct_skills:
      baseline:
        - review-findings-analysis
        - python-testing
        - backend-architecture-clean
      conditional:
        - python-debugging
        - backend-architecture-solid
        - github-pr-review-and-handoff
    delegated_specialists:
      - specialist-review-readiness
  - id: parent-devops
    role_id: devops
    type: parent
    direct_skills:
      baseline:
        - git-branch-and-history
        - github-pr-review-and-handoff
        - operational-delivery-readiness
      conditional:
        - ci-cd-pipeline-operations
        - change-management
        - recovery-triage
    delegated_specialists:
      - specialist-delivery-recovery

modes:
  - id: planning
    source_name: planning
  - id: implementation
    source_name: implementation
  - id: review
    source_name: review
  - id: rework
    source_name: rework
  - id: recovery
    source_name: recovery
  - id: operational-delivery
    source_name: operational_delivery

protocols:
